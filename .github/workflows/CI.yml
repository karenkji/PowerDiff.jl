name: CI
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly nightly check (Sundays at 04:00 UTC)
    - cron: '0 4 * * 0'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  # Runs on every PR and push — single fast job
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  # Full matrix — only on main push and scheduled runs
  test-full:
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1.11']
        os: [ubuntu-latest]
        include:
          - julia-version: '1'
            os: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  # Nightly is informational and only runs on the scheduled workflow.
  test-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: 'nightly'
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
        continue-on-error: true
      - uses: julia-actions/julia-runtest@v1
        continue-on-error: true

  # APF extension — only on main push and scheduled runs.
  # Pinned to Julia 1.12 because upstream AcceleratedDCPowerFlows restricted
  # its compat to julia = "1.12" in commit 4a9eb58 (2026-04-08).
  test-apf-extension:
    if: github.event_name != 'pull_request'
    name: APF Extension (Julia 1.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - name: Install APF (unregistered)
        run: julia --project=. -e 'using Pkg; Pkg.add(url="https://github.com/mtanneau/AcceleratedDCPowerFlows.jl.git")'
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
